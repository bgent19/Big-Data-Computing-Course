# SD411 Big Data Computing — Course Stack
# Version: 1.3 — 2026-05-28
#   v1.0 used bitnami/spark (archived from Docker Hub Aug 2025).
#   v1.1 switched to apache/spark image (entrypoint, user, healthcheck).
#   v1.2 added PATH so `docker exec ... spark-submit` works.
#   v1.3 mounts ./jars into the Spark containers so we can use --jars
#   instead of --packages (Java truststore doesn't trust USNA's TLS
#   interception CA; --packages fails on PKIX path building inside the
#   container even though curl works fine on the host).
#   See CHANGELOG.
#
# Created by: LT Brett Gentile, USN  <bgentile@usna.edu>
# Maintained by: Maj Nick Hardesty, USMC  <nhardest@usna.edu>
#
# Services in this file:
#   spark-master   Spark standalone master      UI: http://localhost:8080
#   spark-worker   one worker (2 cores / 2 GB)  UI: http://localhost:8081
#   minio          S3-compatible object store   API: :9000, Console: :9001
#   minio-init     one-shot bucket bootstrap; exits 0 after seeding 'sd411'
#
# Common commands:
#   docker compose up -d                   bring up the stack
#   docker compose ps                      show service state
#   docker compose logs -f <service>       tail logs
#   docker compose down                    stop and remove containers (keeps data)
#   docker compose down -v                 also wipe MinIO data volume

services:

  spark-master:
    image: apache/spark:3.5.3-python3
    container_name: sd411-spark-master
    # The apache/spark image runs as UID 185 by default; running as root
    # inside the container sidesteps every permission issue with the
    # ./work and ./data bind mounts on student VMs. Fine for a course
    # lab; do NOT replicate this in any production deployment.
    user: "0:0"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    environment:
      # apache/spark image doesn't symlink Spark binaries into /usr/bin,
      # and docker exec doesn't load any profile — so without this, plain
      # `docker exec ... spark-submit` returns "executable not found".
      PATH: "/opt/spark/bin:/opt/spark/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    ports:
      - "8080:8080"   # master UI
      - "7077:7077"   # master RPC (driver -> master)
    volumes:
      - ./work:/opt/work               # student code lands here
      - ./data:/opt/data:ro            # local sample data (read-only)
      - ./jars:/opt/spark/extra-jars:ro  # pre-downloaded S3A connector JARs
      - ivy-cache:/root/.ivy2          # cache --packages downloads
    networks: [sd411-net]
    healthcheck:
      # apache/spark image has no curl/wget; use the bash /dev/tcp builtin.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  spark-worker:
    image: apache/spark:3.5.3-python3
    container_name: sd411-spark-worker
    user: "0:0"
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    environment:
      PATH: "/opt/spark/bin:/opt/spark/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./work:/opt/work
      - ./data:/opt/data:ro
      - ./jars:/opt/spark/extra-jars:ro
      - ivy-cache:/root/.ivy2
    networks: [sd411-net]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: sd411-minio
    command: server /data --console-address ":9001"
    environment:
      # Course-only credentials. Never reuse these anywhere real.
      MINIO_ROOT_USER: sd411admin
      MINIO_ROOT_PASSWORD: sd411password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    networks: [sd411-net]
    healthcheck:
      # The minio image ships with curl; native healthcheck works fine.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    # One-shot: create buckets, seed the Statcast sample, then exit 0.
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: sd411-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks: [sd411-net]
    volumes:
      - ./data:/seed:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 sd411admin sd411password >/dev/null
        mc mb --ignore-existing local/sd411    >/dev/null
        mc mb --ignore-existing local/landing  >/dev/null
        if [ -f /seed/statcast_sample.csv ]; then
          mc cp /seed/statcast_sample.csv local/sd411/raw/statcast_sample.csv
          echo "minio-init: seeded raw/statcast_sample.csv"
        else
          echo "minio-init: WARNING — /seed/statcast_sample.csv not found; bucket empty"
        fi
        echo "minio-init: complete"

networks:
  sd411-net:
    driver: bridge
    name: sd411-net

volumes:
  minio-data:
    name: sd411-minio-data
  ivy-cache:
    name: sd411-ivy-cache
