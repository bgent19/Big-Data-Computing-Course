# =============================================================================
# SD411 2 -- HDFS vs MinIO
# =============================================================================
# Stack: HDFS (1 NameNode + 1 DataNode), MinIO, an interactive `mc` shell,
# and an OPTIONAL Spark pair behind the "spark" profile for the stretch goal.
#
# Normal bring-up:            docker compose up -d
# Bring-up incl. Spark:       docker compose --profile spark up -d
# Tear-down (keep data):      docker compose down
# Tear-down (wipe volumes):   docker compose down -v
#
# =============================================================================

name: sd411-lab02

services:

  # ---------------------------------------------------------------------------
  # HDFS NameNode: all metadata, no data. One of these. That's the point.
  # ---------------------------------------------------------------------------
  namenode:
    image: apache/hadoop:3.3.6
    container_name: lab02-namenode
    hostname: namenode
    user: "0:0"
    command: ["hdfs", "namenode"]
    ports:
      - "9870:9870"     # NameNode web UI  -> http://localhost:9870
      - "8020:8020"     # NameNode RPC
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-hadoop/dfs/name"
      CORE-SITE.XML_fs.defaultFS: "hdfs://namenode:8020"
      # One DataNode in this stack, so replication factor 1. The lab asks you
      # to explain why 3 is impossible here -- do not "fix" this.
      HDFS-SITE.XML_dfs.replication: "1"
      # Aggressive failure detection so the Part 3 drill resolves in ~30-60 s
      # instead of the production default of 10 minutes 30 seconds.
      HDFS-SITE.XML_dfs.heartbeat.interval: "1"
      HDFS-SITE.XML_dfs.namenode.heartbeat.recheck-interval: "10000"
      HDFS-SITE.XML_dfs.permissions.enabled: "false"
      HADOOP_HEAPSIZE_MAX: "512"
    volumes:
      - ./data:/data
      - namenode-meta:/tmp/hadoop-hadoop/dfs
    networks: [sd411-net]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # HDFS DataNode: all data, no metadata. You will kill this one on purpose.
  # ---------------------------------------------------------------------------
  datanode:
    image: apache/hadoop:3.3.6
    container_name: lab02-datanode
    hostname: datanode
    user: "0:0"
    command: ["hdfs", "datanode"]
    ports:
      - "9864:9864"     # DataNode web UI -> http://localhost:9864
    environment:
      CORE-SITE.XML_fs.defaultFS: "hdfs://namenode:8020"
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.heartbeat.interval: "1"
      HDFS-SITE.XML_dfs.namenode.heartbeat.recheck-interval: "10000"
      HADOOP_HEAPSIZE_MAX: "512"
    volumes:
      - datanode-blocks:/tmp/hadoop-hadoop/dfs
    depends_on:
      - namenode
    networks: [sd411-net]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO: S3-compatible object store. Same credentials convention as Lab 0.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    
    container_name: lab02-minio
    hostname: minio
    command: server /data-store --console-address ":9001"
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # MinIO console  -> http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data-store
    networks: [sd411-net]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # mc: an interactive shell with the MinIO client and the lab data mounted.
  # Usage: docker compose exec mc bash
  # ---------------------------------------------------------------------------
  mc:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: lab02-mc
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ./data:/data:ro
    depends_on:
      - minio
    networks: [sd411-net]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OPTIONAL Spark pair for the stretch goal (read the same file from both
  # hdfs:// and s3a://). Started only with: docker compose --profile spark up -d
  # ---------------------------------------------------------------------------
  spark-master:
    profiles: ["spark"]
    image: apache/spark:3.5.3-python3
    container_name: lab02-spark-master
    hostname: spark-master
    user: "0:0"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      PATH: "/opt/spark/bin:/opt/spark/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    ports:
      - "8080:8080"     # Spark master UI
      - "7077:7077"
    volumes:
      - ./jars:/opt/spark/extra-jars:ro
      - ./scripts:/opt/lab02:ro
    networks: [sd411-net]

  spark-worker:
    profiles: ["spark"]
    image: apache/spark:3.5.3-python3
    container_name: lab02-spark-worker
    user: "0:0"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      PATH: "/opt/spark/bin:/opt/spark/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/spark/extra-jars:ro
    networks: [sd411-net]

networks:
  sd411-net:
    driver: bridge

volumes:
  namenode-meta:
  datanode-blocks:
  minio-data:
